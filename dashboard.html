<style>
:root{
  --navy:#0B1F3A;--navy2:#143B68;--blue:#1F6FEB;--cyan:#16A3B8;--green:#178A4A;
  --red:#C7362F;--amber:#C78A14;--purple:#6B46C1;--teal:#0D9488;--orange:#EA580C;
  --fisio:#0891B2;--nutri:#16A34A;--fono:#9333EA;--farma:#B45309;
  --bg:#EEF2F8;--card:#FFFFFF;--ink:#102033;--muted:#667085;--line:#D0D8E8;--soft:#F4F7FC;
  --shadow:0 4px 24px rgba(12,32,58,.09);
  --logo-bg:#ffffff;
}
body.dark{
  --bg:#0B1420;--card:#141F2E;--ink:#E7ECF4;--muted:#8A96AA;--line:#263244;--soft:#1A2638;
  --navy:#E7ECF4;--navy2:#C7D2E3;
  --shadow:0 4px 24px rgba(0,0,0,.45);
  --logo-bg:#141F2E;
}
body.dark .hero{background:#0E1826;box-shadow:0 1px 0 var(--line),0 2px 12px rgba(0,0,0,.35)}
body.dark .tab{color:var(--muted)}
body.dark .tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
body.dark .tab:hover:not(.active){color:var(--ink);background:#1A2638}
body.dark .filters select{background:#1A2638;color:var(--ink);border-color:var(--line)}
body.dark .kpi,body.dark .chart,body.dark .tablewrap,body.dark .eq-card,body.dark table{background:var(--card);border-color:var(--line)}
body.dark th{background:#1A2638;color:var(--muted)}
body.dark td{border-color:var(--line)}
body.dark .secondary,body.dark .export{background:var(--card);border-color:var(--line);color:var(--ink)}
body.dark .progress-bar{background:var(--line)}
.theme-toggle{border:1.5px solid var(--line);background:var(--card);border-radius:10px;width:38px;height:38px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;transition:.2s;box-shadow:0 2px 10px rgba(12,32,58,.15)}
.theme-toggle:hover{background:var(--soft)}
.logo-img{background:var(--logo-bg);padding:4px 8px;border-radius:10px;transition:background-color .2s}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'DM Sans',system-ui,sans-serif;font-size:14px;line-height:1.6}
.hero{background:#fff;color:var(--ink);padding:0 24px;position:sticky;top:0;z-index:100;box-shadow:0 1px 0 var(--line),0 2px 12px rgba(12,32,58,.06)}
.hero-inner{display:flex;align-items:center;flex-wrap:wrap;max-width:1320px;margin:0 auto;min-height:64px;gap:8px 0;padding:6px 0}
.logo-area{display:flex;align-items:center;gap:12px;flex-shrink:0;margin-right:40px;min-width:0}
.logo-img{display:flex;align-items:center;flex-shrink:0}
.logo-img img{max-width:100%;height:auto}
.hero-title{min-width:0}
.hero-title p{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.02em;white-space:normal;word-break:break-word}
.tabs{display:flex;gap:0;align-items:stretch;flex:1 1 auto;overflow-x:auto;height:64px;min-width:0}
.tab{border:none;background:transparent;color:var(--muted);padding:0 18px;font-weight:700;cursor:pointer;font-size:13.5px;border-bottom:3px solid transparent;border-top:3px solid transparent;transition:.15s;font-family:'DM Sans',sans-serif;white-space:nowrap;height:100%;display:flex;align-items:center;flex-shrink:0}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab:hover:not(.active){color:var(--navy);background:#F4F7FC}
main{max-width:1320px;margin:0 auto;padding:22px 18px}
.page{display:none}.page.active{display:block}
.panel{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:24px;margin-bottom:18px}
.panel-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:16px}
h2{font-size:17px;font-weight:900;letter-spacing:-.02em}
.sub{margin:4px 0 0;color:var(--muted);font-size:12.5px;line-height:1.45;max-width:840px}
.chip{display:inline-flex;align-items:center;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:800;white-space:nowrap;font-family:'DM Mono',monospace}
.chip-blue{background:#EAF2FF;color:var(--blue)}.chip-green{background:#E8F7EF;color:var(--green)}.chip-teal{background:#E0F5F7;color:var(--teal)}
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:18px}
.kpi{background:white;border:1px solid var(--line);border-radius:16px;padding:14px 16px;position:relative;overflow:hidden}
.kpi small{display:block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px}
.kpi b{display:block;font-size:28px;font-weight:900;font-family:'DM Mono',monospace;letter-spacing:-.03em;line-height:1}
.kpi span{display:block;font-size:11px;color:var(--muted);margin-top:4px}
.kpi-blue::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--blue)}
.kpi-green::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--green)}
.kpi-red::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--red)}
.kpi-amber::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--amber)}
.kpi-purple::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--purple)}
.kpi-teal::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--teal)}
.progress-bar{height:6px;background:var(--line);border-radius:3px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:.5s}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
.chart{background:white;border:1px solid var(--line);border-radius:16px;padding:16px;position:relative}
.chart h3{font-size:13px;font-weight:800;color:var(--navy);margin-bottom:12px}
.chart canvas{max-height:260px}
.wide{grid-column:1/-1}
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.filters select{border:1.5px solid var(--line);border-radius:10px;padding:7px 12px;font-size:12px;font-family:'DM Sans',sans-serif;background:white;cursor:pointer;color:var(--ink)}
.secondary{border:1.5px solid var(--line);background:white;border-radius:10px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;color:var(--navy);font-family:'DM Sans',sans-serif;transition:.15s}
.secondary:hover{background:var(--soft)}
.export{border:1.5px solid var(--blue);background:white;border-radius:10px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;color:var(--blue);font-family:'DM Sans',sans-serif}
.tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:14px;background:white}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{background:#F4F7FC;padding:10px 12px;text-align:left;font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:1px solid var(--line)}
td{padding:9px 12px;border-bottom:1px solid var(--soft);vertical-align:middle}
tr:last-child td{border-bottom:none}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.meta{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:14px}
.meta-3{grid-template-columns:repeat(3,1fr)}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.field input,.field select{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:9px 11px;font-size:13px;font-family:'DM Sans',sans-serif;background:white;color:var(--ink)}
.eq-card{background:white;border:1px solid var(--line);border-radius:16px;padding:16px;overflow:hidden;position:relative}
.eq-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.eq-fisio::before{background:var(--fisio)}.eq-nutri::before{background:var(--nutri)}
.eq-fono::before{background:var(--fono)}.eq-farma::before{background:var(--farma)}
.pct-ring{position:relative;width:80px;height:80px;margin:0 auto 10px}
.pct-ring svg{transform:rotate(-90deg)}
.pct-ring-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;font-family:'DM Mono',monospace}
.bench-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--soft)}
.bench-item:last-child{border-bottom:none}
@media(max-width:1080px){.charts-grid,.meta{grid-template-columns:1fr 1fr}.kpis{grid-template-columns:repeat(3,1fr)}}
@media(max-width:760px){
  .hero{padding:0 12px}.hero-inner{padding:8px 0}
  .logo-area{width:100%;margin-right:0}.logo-img img{height:30px}
  .tabs{width:100%;flex:1 1 100%;height:46px}.tab{padding:0 12px;font-size:12px}
  main{padding:14px 10px}.panel{padding:14px;border-radius:14px}

// Coleta todas as keys multiprofissionais para scoring
function allMultiKeys(){
  const keys=[];
  EQUIPES.forEach(eq=>{
    keys.push(eq.keyPresenca);
    eq.subItens.forEach(si=>{keys.push(si.key);si.subSub.forEach(ss=>keys.push(ss.key))});
  });
  return keys;
}

let sheetsLoadError=null;

function rowToRecord(row){
  const answers={};
  const fisAnswers={};
  ITEMS.forEach(i=>{
    const v=row['item_'+i.num];
    const n=norm(v);
    if(n) answers[i.num]=n;
  });
  if(typeof ITEMS_FISICO!=='undefined'){
    ITEMS_FISICO.forEach(i=>{
      const v=row['fis_item_'+i.num];
      const n=norm(v);
      if(n) fisAnswers[i.num]=n;
    });
  }
  allMultiKeys().forEach(k=>{
    const v=row[k];
    const n=norm(v);
    if(n) answers[k]=n;
  });
  return{
    id:row.id||Date.now(),
    date:row.data_auditoria||'',
    attendance:row.numero_atendimento||'',
    sector:row.setor_auditado||'',
    tipoInt:row.tipo_internacao||'',
    auditor:row.auditor||'',
    diasIntern:row.dias_internacao||'',
    desfecho:row.desfecho||'',
    tipoProntuario:row.tipo_prontuario||'online',
    observacoes:row.observacoes||'',
    answers,
    fisAnswers
  };
}

async function loadFromSheets(){
  sheetsLoadError=null;
  if(!SHEETS_WEBAPP_URL||SHEETS_WEBAPP_URL==='COLE_AQUI_A_URL_DO_SEU_APPS_SCRIPT'){
    sheetsLoadError='SHEETS_WEBAPP_URL não configurada.';
    data=[];
    return;
  }
  try{
    const res=await fetch(SHEETS_WEBAPP_URL+'?action=list');
    const json=await res.json();
    if(json.status==='ok'&&Array.isArray(json.rows)){
      data=json.rows.map(rowToRecord);
    }else{
      sheetsLoadError=json.message||'Resposta inesperada do Google Sheets.';
      data=[];
    }
  }catch(err){
    sheetsLoadError='Erro ao buscar dados do Google Sheets: '+err.message;
    data=[];
  }
}

function norm(v){
  if(!v && v!==0) return '';
  const s=String(v).trim().toLowerCase();
  if(s==='sim') return 'sim';
  if(s==='não'||s==='nao') return 'nao';
  if(s==='não se aplica'||s==='n/a'||s==='na') return 'na';
  if(s==='—'||s==='-'||s==='') return '';
  return s;
}
function label(v){return v==='sim'?'sim':v==='nao'?'não':v==='na'?'N/A':''}

/*  SCORING */
function score(rec){
  let sim=0,nao=0,na=0,app=0;
  ITEMS.forEach(i=>{const v=rec.answers[i.num];if(v==='sim'){sim++;app++}else if(v==='nao'){nao++;app++}else if(v==='na')na++});
  return{sim,nao,na,app,pct:app?Math.round(sim/app*100):0};
}

// Scoring de um campo multi para um array de registros
function multiFieldPct(arr, key){
  let sim=0,nao=0,app=0;
  arr.forEach(r=>{const v=r.answers[key];if(v==='sim'){sim++;app++}else if(v==='nao'){nao++;app++}});
  return{sim,nao,app,pct:app?Math.round(sim/app*100):null,n:arr.length};
}

// Para cada equipe: presena, e cada sub-item condicionado a presena=sim
function equipeStats(arr, eq){
  const pres=multiFieldPct(arr, eq.keyPresenca);
  const presArr=arr.filter(r=>r.answers[eq.keyPresenca]==='sim');
  const subs=eq.subItens.map(si=>{
    const s=multiFieldPct(presArr, si.key);
    const subs2=si.subSub.map(ss=>{
      const presArr2=presArr.filter(r=>r.answers[si.key]==='sim');
      return{...multiFieldPct(presArr2, ss.key), text:ss.text, key:ss.key};
    });
    return{...s, text:si.text, key:si.key, subSub:subs2};
  });
  return{eq, pres, presArr, subs};
}

function itemStats(arr){
  return ITEMS.map(i=>{
    let sim=0,nao=0,na=0;
    arr.forEach(r=>{const v=r.answers[i.num];if(v==='sim')sim++;else if(v==='nao')nao++;else if(v==='na')na++;});
    const app=sim+nao;
    return{...i,sim,nao,na,app,pct:app?Math.round(sim/app*100):0};
  });
}

function domainStats(arr){
  return [...new Set(ITEMS.map(i=>i.domain))].map(d=>{
    const its=ITEMS.filter(i=>i.domain===d);
    let sim=0,app=0;
    arr.forEach(r=>its.forEach(i=>{const v=r.answers[i.num];if(v==='sim'){sim++;app++}else if(v==='nao')app++;}));
    return{domain:d,pct:app?Math.round(sim/app*100):0,count:its.length,color:DOMAIN_MAP[d]};
  });
}

function getFiltered(sid='filterSector', mid='filterMonth', tid='filterTipo'){
  const s=$(sid)?.value||'',m=$(mid)?.value||'',t=$(tid)?.value||'';
  const tp=document.getElementById('filterProntuario')?.value||'';
  return data.filter(r=>{
    if(s && r.sector!==s) return false;
    if(m && r.date.slice(0,7)!==m) return false;
    if(t && r.tipoInt!==t) return false;
    if(tp){
      const rtp=(r.tipoProntuario||'online').toLowerCase();
      if(tp==='online' && rtp!=='online') return false;
      if(tp==='fisico' && rtp!=='fisico') return false;
      if(tp==='ambos' && rtp!=='ambos') return false;
    }
    return true;
  });
}

function scoreFisico(arr){
  let sim=0,nao=0,na=0,app=0;
  arr.forEach(r=>{
    if(!r.fisAnswers) return;
    ITEMS_FISICO.forEach(i=>{
      const v=r.fisAnswers[i.num];
      if(v==='sim'){sim++;app++;}
      else if(v==='nao'){nao++;app++;}
      else if(v==='na') na++;
    });
  });
  return{sim,nao,na,app,pct:app?Math.round(sim/app*100):0};
}

/* Calcula score dos itens físicos de um conjunto de registros */
function scoreFisico(arr){
  let sim=0,nao=0,na=0,app=0;
  arr.forEach(r=>{
    if(!r.fisAnswers) return;
    ITEMS_FISICO.forEach(i=>{
      const v=r.fisAnswers[i.num];
      if(v==='sim'){sim++;app++;}
      else if(v==='nao'){nao++;app++;}
      else if(v==='na') na++;
    });
  });
  return{sim,nao,na,app,pct:app?Math.round(sim/app*100):0};
}

      <h3 style="font-size:13px;font-weight:900;color:var(--${eq.cls});margin-bottom:10px;display:flex;align-items:center;gap:6px">${eq.icone} ${eq.label}  detalhe por setor</h3>
      <div class="tablewrap">
        <table><thead><tr><th>Setor</th>${allSubTexts.map(t=>`<th style="max-width:160px;white-space:normal;line-height:1.3">${t}</th>`).join('')}</tr></thead>
        <tbody>${rows}</tbody></table>
      </div>
    </div>`;
  }).join('');

  //  Grfico: presena por equipe  setor 
  const chartEquipeSetor=EQUIPES.map((eq,i)=>({
    label:eq.label,
    data:setores.map(sec=>{
      const sarr=arr.filter(r=>r.sector===sec);
      return multiFieldPct(sarr,eq.keyPresenca).pct??0;
    }),
    backgroundColor:`var(--${eq.cls})88`,
    borderColor:`var(--${eq.cls})`,
    borderWidth:2,borderRadius:4
  }));

  c.innerHTML=`
  ${kpiHtml}

  <!-- Comparativo visual geral + sub-itens -->
  <div class="charts-grid" style="margin-bottom:16px">
    <div class="chartbox">
      <h3>Presena de evoluo  comparativo entre equipes (%)</h3>
      <div class="chart"><canvas id="cEqGeral"></canvas></div>
    </div>
    <div class="chartbox">
      <h3>Presena de evoluo por equipe  setor (%)</h3>
      <div class="chart"><canvas id="cEqSetor"></canvas></div>
    </div>
  </div>

  <!-- Cards detalhados por equipe -->
  <h3 style="font-size:14px;font-weight:900;margin-bottom:12px">Detalhamento por equipe  itens condicionais</h3>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
    ${detailCards}
  </div>

  <!-- Tabela por setor resumida -->
  <h3 style="font-size:14px;font-weight:900;margin-bottom:10px">Presena de evoluo por setor  equipe</h3>
  <div class="tablewrap" style="margin-bottom:20px">
    <table><thead><tr><th>Setor</th>${EQUIPES.map(eq=>`<th>${eq.icone} ${eq.label}</th>`).join('')}</tr></thead>
    <tbody>${setorRows}</tbody></table>
  </div>

  <!-- Tabelas detalhadas por equipe  setor -->
  <h3 style="font-size:14px;font-weight:900;margin-bottom:4px">Detalhe por sub-item condicional  por equipe e setor</h3>
  <p style="font-size:12px;color:var(--muted);margin-bottom:14px">Sub-itens s aparecem condicionados  presena de evoluo registrada. "" indica sem dados suficientes.</p>
  ${subDetailTables}
  `;

  // render charts
  mkChart('cEqGeral','bar',eqLabels,[{
    data:eqPcts,
    backgroundColor:EQUIPES.map(e=>`var(--${e.cls})AA`),
    borderColor:EQUIPES.map(e=>`var(--${e.cls})`),
    borderWidth:2,borderRadius:8
  }],{scales:{y:{beginAtZero:true,max:100,ticks:{callback:v=>v+'%'}}},plugins:{legend:{display:false}}});

  if(setores.length>0){
    mkChart('cEqSetor','bar',setores,chartEquipeSetor,{
      scales:{y:{beginAtZero:true,max:100,ticks:{callback:v=>v+'%'}}},
      plugins:{legend:{display:true,position:'bottom',labels:{boxWidth:12,font:{size:11}}}}
    });
  }
}

/*  BENCHMARKS */
function renderBench(){
  $('benchContent').innerHTML='<div class="panel empty"> Carregando dados do Google Sheets...</div>';
  loadFromSheets().then(()=>{
    if(sheetsLoadError){
      $('benchContent').innerHTML=`<div class="panel empty"> ${sheetsLoadError}<br><button class="secondary" style="margin-top:10px" onclick="renderBench()"> Tentar novamente</button></div>`;
      return;
    }
    renderBenchContent();
  });
}
function renderBenchContent(){
  const arr=data;
  const stats=arr.length?itemStats(arr):null;

      <div><h2>Painel de benchmarks nacionais e internacionais</h2>
      <p class="sub">Referncias: JCI, QMENTUM (Accreditation Canada), ONA, CFM Res. 1638/2002, COFEN, ANVISA/IHI, ANS, ESPEN, ISMP. Conformidade calculada sobre os dados da instituio quando disponveis.</p></div>
      <span class="chip chip-purple">Evidncia AB</span>
    </div>
    <table class="bench-table">
      <thead><tr><th>#</th><th>Item</th><th>Domnio</th><th>Referncia</th><th>Meta</th><th>Instituio</th><th>Status</th></tr></thead>
      <tbody>
        ${ITEMS.map(it=>{
          const s=stats?stats.find(x=>x.num===it.num):null;
          const inst=s&&s.app>0?s.pct:null;
          const m=it.benchmark.match(/meta:\s*(\d+)/);
          const meta=m?parseInt(m[1]):null;
          let stO={cls:'bs-neutral',label:'Sem dados'};
          if(inst!==null&&meta!==null) stO=inst>=meta?{cls:'bs-above',label:` ${inst}%`}:inst>=meta-10?{cls:'bs-warn',label:` ${inst}%`}:{cls:'bs-below',label:` ${inst}%`};
          else if(inst!==null) stO={cls:'bs-neutral',label:`${inst}%`};
          return `<tr>
            <td><b style="font-family:'DM Mono',monospace">${it.num}</b>${it.novo?'<span class="badge" style="background:#EDE8FF;color:#7C3AED;margin-left:4px;font-size:10px">novo</span>':''}</td>
            <td style="max-width:280px;font-size:12.5px">${it.text}</td>
            <td style="font-size:11px;font-weight:700;color:${DOMAIN_MAP[it.domain]||'var(--muted)'}">${it.domain}</td>
            <td style="font-size:11px;color:var(--muted)">${it.benchmark}</td>
            <td><b>${meta?meta+'%':''}</b></td>
            <td><b>${inst!==null?inst+'%':''}</b></td>
            <td><span class="${stO.cls}">${stO.label}</span></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>
  <div class="panel">
    <div class="panel-head"><div><h2>Justificativa dos 9 itens incorporados por benchmark</h2></div><span class="chip chip-purple">9 novos itens</span></div>
    <table class="bench-table">
      <thead><tr><th>#</th><th>Item</th><th>Justificativa</th><th>Referncia</th></tr></thead>
      <tbody>${ITEMS.filter(i=>i.novo).map(it=>`<tr>
        <td><b style="font-family:'DM Mono',monospace">${it.num}</b></td>
        <td style="max-width:220px;font-size:12.5px;font-weight:600">${it.text}</td>
        <td style="font-size:12px;max-width:360px;line-height:1.5">${it.ref||''}</td>
        <td style="font-size:11px;color:var(--muted)">${it.benchmark}</td>
      </tr>`).join('')}</tbody>
    </table>
  </div>`;
}

/*  EXPORT */
function exportCSV(){
  const multiKeys=allMultiKeys();
  const multiLabels={
    fisio_presenca:'Fisio  Presena evoluo',
    fisio_metas:'Fisio  Metas motoras/desmame O2',
    nutri_presenca:'Nutri  Presena evoluo',
    nutri_aval48h:'Nutri  Avaliao nutricional 48h',
    nutri_reaval:'Nutri  Reavaliao nutricional diria',
    fono_presenca:'Fono  Presena evoluo',
    fono_deglut:'Fono  Avaliao de deglutio',
    farma_presenca:'Farma  Presena evoluo',
    farma_interacao:'Farma  Interao medicamentosa',
    farma_reconcil:'Farma  Reconciliao medicamentosa'
  };
  const headers=['data_auditoria','numero_atendimento','setor_auditado','tipo_internacao','auditor','dias_internacao','desfecho','conformidade_geral_pct',
    ...ITEMS.map(i=>i.num+'. '+i.text.substring(0,55)),
    ...multiKeys.map(k=>multiLabels[k]||k)
  ];
  const rows=data.map(r=>{
    const s=score(r);
    return[r.date,r.attendance,r.sector,r.tipoInt||'',r.auditor||'',r.diasIntern||'',r.desfecho||'',s.pct+'%',
      ...ITEMS.map(i=>label(r.answers[i.num]||'')),
      ...multiKeys.map(k=>label(r.answers[k]||''))
    ];
  });
  const csv=[headers,...rows].map(row=>row.map(v=>'"'+String(v).replaceAll('"','""')+'"').join(';')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='auditoria_prontuarios_v6.csv';a.click();URL.revokeObjectURL(a.href);
}

/*  INIT */
(function(){
  const SESSION_KEY='hps_dash_auth';
  if(sessionStorage.getItem(SESSION_KEY)==='ok'){
    document.getElementById('loginOverlay').style.display='none';
    dash();
  } else {
    const overlay=document.getElementById('loginOverlay');
    overlay.style.display='flex';
    setTimeout(()=>{ const p=document.getElementById('dashPass'); if(p) p.focus(); },100);
  }
  window.checkAuth=function(){
    const val=document.getElementById('dashPass').value;
    if(val===SENHA){
      sessionStorage.setItem(SESSION_KEY,'ok');
      document.getElementById('loginOverlay').style.display='none';
      dash();
    } else {
      const el=document.getElementById('authErr');
      if(el){ el.textContent='Senha incorreta.'; setTimeout(()=>el.textContent='',3000); }
      const p=document.getElementById('dashPass');
      if(p){ p.value=''; p.focus(); }
    }
  };
})();
